<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon To-Do App</title>
   <link rel="stylesheet" href="output.css">
    <link rel="stylesheet" href="style.css">
    <script type="module" src="https://unpkg.com/ionicons@8.0.13/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@8.0.13/dist/ionicons/ionicons.js"></script>
    
</head>

<body class="bg-gradient-to-r from-pink-500 via-purple-500 to-indigo-500 min-h-screen w-full flex items-center justify-center p-4">

    <div id="container" class="flex flex-col items-center h-auto min-h-[400px] w-96 p-6 border-indigo-600/30 border-2 rounded-3xl bg-transparent backdrop-blur-3xl shadow-slate-600 shadow-2xl overflow-y-hidden">

        <h1 class="text-center font-bold text-3xl p-4 mb-6 mt-2 text-white drop-shadow-[0_0_8px_rgba(255,255,255,0.3)]">
            To-Do App
        </h1>
        
        <div class="flex mb-6 gap-3 w-full">
            <input id="todo-input"
                class="flex-1 border-none text-white rounded-3xl px-5 py-2.5 bg-pink-900/30 shadow-slate-600/40 shadow-xl placeholder:text-white/60 transition-all duration-300 focus:outline-none focus:scale-105 focus:ring-cyan-400/30 focus:ring-2 backdrop-blur-3xl"
                type="text" placeholder="Add a new task...">

            <button onclick="addTask()"
                class="border-none px-4 rounded-full text-white font-extrabold text-xl text-center bg-pink-900/30 backdrop-blur-3xl shadow-slate-600 shadow-xl hover:scale-110 active:scale-95 transition-all duration-300 cursor-pointer">
                <ion-icon name="add-outline" class="align-middle"></ion-icon>
            </button>
        </div>

        <ul id="todo-list" class="w-full flex flex-col">
            </ul>

    </div>
<script src="script.js"></script>
       
</body>
</html>
